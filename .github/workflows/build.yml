name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Build and package
        run: yarn run release:mac
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: MarkText-zh-mac
          path: build/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Build and package
        run: yarn run release:win
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: MarkText-zh-win
          path: build/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: yarn
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev libfontconfig-dev
      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Build and package
        run: yarn run release:linux
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: MarkText-zh-linux
          path: build/*.AppImage
