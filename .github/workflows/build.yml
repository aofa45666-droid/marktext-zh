name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts
      - name: Build webpack bundles
        run: node .electron-vue/build.js
      - name: Build Chinese DMG (ARM64)
        run: |
          curl -L -o /tmp/marktext.dmg \
            "https://github.com/marktext/marktext/releases/download/v0.17.1/marktext-arm64.dmg"
          hdiutil attach /tmp/marktext.dmg -mountpoint /tmp/mnt -quiet
          cp -R /tmp/mnt/MarkText.app /tmp/MarkText-zh.app
          hdiutil detach /tmp/mnt -quiet
          npx asar extract /tmp/MarkText-zh.app/Contents/Resources/app.asar /tmp/extracted
          rm -rf /tmp/extracted/dist/electron/
          cp -r dist/electron/ /tmp/extracted/dist/electron/
          rm -f /tmp/app.asar
          npx asar pack /tmp/extracted /tmp/app.asar
          cp /tmp/app.asar /tmp/MarkText-zh.app/Contents/Resources/app.asar
          mkdir -p /tmp/dmg-out
          codesign --deep --force --sign - /tmp/MarkText-zh.app
          sleep 2
          hdiutil create -volname "MarkText-zh" -srcfolder /tmp/MarkText-zh.app \
            -ov -format UDZO /tmp/dmg-out/MarkText-zh-arm64.dmg
          cp /tmp/dmg-out/MarkText-zh-arm64.dmg MarkText-zh-arm64.dmg
      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            MarkText-zh-arm64.dmg \
            --repo ${{ github.repository }} \
            --title "MarkText v0.17.1 简体中文汉化版" \
            --notes "MarkText v0.17.1 简体中文汉化版" \
            --latest || \
          gh release upload ${{ github.ref_name }} MarkText-zh-arm64.dmg \
            --repo ${{ github.repository }} --clobber

  build-mac-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts
      - name: Build webpack bundles
        run: node .electron-vue/build.js
      - name: Build Chinese DMG (x64)
        run: |
          curl -L -o /tmp/marktext.dmg \
            "https://github.com/marktext/marktext/releases/download/v0.17.1/marktext-x64.dmg"
          hdiutil attach /tmp/marktext.dmg -mountpoint /tmp/mnt -quiet
          cp -R /tmp/mnt/MarkText.app /tmp/MarkText-zh.app
          hdiutil detach /tmp/mnt -quiet
          npx asar extract /tmp/MarkText-zh.app/Contents/Resources/app.asar /tmp/extracted
          rm -rf /tmp/extracted/dist/electron/
          cp -r dist/electron/ /tmp/extracted/dist/electron/
          rm -f /tmp/app.asar
          npx asar pack /tmp/extracted /tmp/app.asar
          cp /tmp/app.asar /tmp/MarkText-zh.app/Contents/Resources/app.asar
          mkdir -p /tmp/dmg-out
          codesign --deep --force --sign - /tmp/MarkText-zh.app
          sleep 2
          hdiutil create -volname "MarkText-zh" -srcfolder /tmp/MarkText-zh.app \
            -ov -format UDZO /tmp/dmg-out/MarkText-zh-x64.dmg
          cp /tmp/dmg-out/MarkText-zh-x64.dmg MarkText-zh-x64.dmg
      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} MarkText-zh-x64.dmg \
            --repo ${{ github.repository }} --clobber
