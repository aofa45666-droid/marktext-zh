name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (skip native build)
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Build webpack bundles
        run: node .electron-vue/build.js

      - name: Download official MarkText release
        run: |
          curl -L -o /tmp/marktext.dmg "https://github.com/marktext/marktext/releases/download/v0.17.1/marktext-arm64.dmg"
          hdiutil attach /tmp/marktext.dmg -mountpoint /tmp/mnt -quiet
          cp -R /tmp/mnt/MarkText.app /tmp/MarkText.app
          hdiutil detach /tmp/mnt -quiet

      - name: Replace with Chinese build
        run: |
          # Extract original app.asar
          rm -rf /tmp/extracted
          npx asar extract /tmp/MarkText.app/Contents/Resources/app.asar /tmp/extracted
          # Replace dist/electron/ with our build
          rm -rf /tmp/extracted/dist/electron/
          cp -r dist/electron/ /tmp/extracted/dist/electron/
          # Re-pack asar
          rm -f /tmp/app.asar
          npx asar pack /tmp/extracted /tmp/app.asar
          cp /tmp/app.asar /tmp/MarkText.app/Contents/Resources/app.asar

      - name: Sign app (ad-hoc)
        run: codesign --deep --force --sign - /tmp/MarkText.app

      - name: Package DMG
        run: |
          mkdir -p build
          hdiutil create -volname "MarkText-zh" -srcfolder /tmp/MarkText.app -ov -format UDZO build/MarkText-zh-arm64.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: MarkText-zh-mac
          path: build/*.dmg
